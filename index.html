<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>HighCastle - שיתוף מיקום ושרטוט</title>
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Heebo, Arial, sans-serif; background: #0f172a; color: #e2e8f0; touch-action: none; }
    body { user-select: none; -webkit-user-select: none; }

    /* --- LOADING --- */
    #loadingScreen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); z-index: 1000; gap: 20px; }
    #loadingScreen .logo { width: 80px; height: 80px; background: #22d3ee; border-radius: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 40px rgba(34, 211, 238, 0.4); }
    #loadingScreen .logo svg { width: 50px; height: 50px; fill: #0f172a; }
    #loadingScreen h1 { margin: 0; font-size: 26px; font-weight: 700; color: #f1f5f9; }
    .spinner { width: 32px; height: 32px; border: 3px solid rgba(34,211,238,0.2); border-top-color: #22d3ee; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- SETUP --- */
    #setupScreen { position: fixed; inset: 0; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); z-index: 900; display: none; flex-direction: column; padding: 24px; padding-top: max(24px, env(safe-area-inset-top)); overflow-y: auto; }
    #setupScreen.active { display: flex; }
    .setup-card { background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(148, 163, 184, 0.15); border-radius: 16px; padding: 20px; margin-bottom: 16px; backdrop-filter: blur(12px); }
    .field input { width: 100%; padding: 14px; background: rgba(15, 23, 42, 0.7); border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 10px; color: #f1f5f9; font-size: 16px; outline: none; }
    .btn { width: 100%; padding: 16px; background: #22d3ee; color: #0f172a; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; }

    /* --- MAIN APP --- */
    #app { position: fixed; inset: 0; display: none; }
    #app.active { display: block; }
    #map { position: absolute; inset: 0; background: #1e293b; z-index: 1; }
    #drawCanvas { position: absolute; inset: 0; z-index: 400; pointer-events: none; }
    #drawCanvas.active { pointer-events: auto; }

    /* --- TOP BAR --- */
    .top-bar { position: absolute; top: 0; left: 0; right: 0; z-index: 500; padding: max(12px, env(safe-area-inset-top)) 12px 12px; display: flex; gap: 8px; pointer-events: none; }
    .top-bar > * { pointer-events: auto; }
    .pill { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(148, 163, 184, 0.15); border-radius: 14px; padding: 10px 14px; display: flex; align-items: center; gap: 8px; color: #e2e8f0; font-size: 13px; }
    .group-code { color: #22d3ee; font-family: monospace; font-size: 15px; }
    .icon-btn { width: 44px; height: 44px; background: rgba(15, 23, 42, 0.85); border: 1px solid rgba(148, 163, 184, 0.15); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: #e2e8f0; }

    /* --- MEMBERS BAR --- */
    .members-bar { position: absolute; top: calc(max(12px, env(safe-area-inset-top)) + 60px); left: 12px; right: 12px; z-index: 500; display: flex; gap: 6px; overflow-x: auto; pointer-events: auto; }
    .member-chip { background: rgba(15, 23, 42, 0.85); border-radius: 20px; padding: 6px 12px 6px 6px; display: flex; align-items: center; gap: 6px; font-size: 12px; flex-shrink: 0; }
    .member-chip .avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #0f172a; font-weight: bold; }

    /* --- BOTTOM TOOLBAR (No Colors) --- */
    .bottom-bar { position: absolute; bottom: 0; left: 0; right: 0; z-index: 500; padding: 12px 12px max(12px, env(safe-area-inset-bottom)); display: flex; flex-direction: column; align-items: center; pointer-events: none; }
    .tools { pointer-events: auto; display: flex; gap: 8px; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(148, 163, 184, 0.15); border-radius: 20px; padding: 8px; }
    .tool { width: 50px; height: 50px; border-radius: 14px; display: flex; align-items: center; justify-content: center; color: #cbd5e1; background: transparent; border: none; cursor: pointer; }
    .tool.active { background: #22d3ee; color: #0f172a; }
    .tool svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; }
    .tool.danger { color: #f87171; }

    /* סמן משתמש */
    .user-marker { width: 18px; height: 18px; border-radius: 50%; border: 3px solid #0f172a; position: relative; }
    .marker-label { position: absolute; top: 22px; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.9); padding: 2px 8px; border-radius: 10px; font-size: 11px; white-space: nowrap; }

    #toast { position: fixed; top: 20%; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.9); padding: 10px 20px; border-radius: 12px; z-index: 2000; opacity: 0; transition: 0.3s; pointer-events: none; }
    #toast.visible { opacity: 1; }

    /* MENU SHEET */
    #menuSheet { position: fixed; inset: 0; z-index: 600; display: none; }
    #menuSheet.active { display: block; }
    .sheet-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.5); }
    .sheet-content { position: absolute; bottom: 0; left: 0; right: 0; background: #1e293b; border-radius: 24px 24px 0 0; padding: 20px; }
    .sheet-item { display: flex; align-items: center; gap: 12px; padding: 15px; color: #e2e8f0; border-radius: 12px; }
  </style>
</head>
<body>

  <div id="loadingScreen">
    <div class="logo"><svg viewBox="0 0 100 100"><path d="M50 20c-11 0-20 9-20 20 0 15 20 40 20 40s20-25 20-40c0-11-9-20-20-20zm0 28a8 8 0 110-16 8 8 0 010 16z"/></svg></div>
    <h1>HighCastle</h1>
    <div class="spinner"></div>
  </div>

  <div id="setupScreen">
    <div class="setup-card">
      <h2>הצטרפות</h2>
      <div class="field"><input type="text" id="nameInput" placeholder="השם שלך" maxlength="15" /></div>
      <div class="field" style="margin-top:10px;"><input type="text" id="joinCodeInput" placeholder="קוד קבוצה (אופציונלי)" /></div>
      <button class="btn" id="joinBtn" style="margin-top:20px;">היכנס</button>
      <button class="btn" id="createBtn" style="margin-top:10px; background: #334155; color: white;">צור קבוצה חדשה</button>
    </div>
  </div>

  <div id="app">
    <div id="map"></div>
    <canvas id="drawCanvas"></canvas>

    <div class="top-bar">
      <div class="pill">קבוצה: <span class="group-code" id="groupCodeDisplay">—</span></div>
      <div class="icon-btn" id="centerBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg></div>
      <div class="icon-btn" id="menuBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg></div>
    </div>

    <div class="members-bar" id="membersBar"></div>

    <div class="bottom-bar">
      <div class="tools">
        <button class="tool active" data-tool="pan"><svg viewBox="0 0 24 24"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/></svg></button>
        <button class="tool" data-tool="draw"><svg viewBox="0 0 24 24"><path d="M17 3a2.85 2.85 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg></button>
        <button class="tool" data-tool="line"><svg viewBox="0 0 24 24"><line x1="5" y1="19" x2="19" y2="5"/><circle cx="5" cy="19" r="1.5"/><circle cx="19" cy="5" r="1.5"/></svg></button>
        <button class="tool" data-tool="x"><svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>
        <button class="tool" data-tool="undo"><svg viewBox="0 0 24 24"><path d="M3 7v6h6M21 17a9 9 0 00-15-6.7L3 13"/></svg></button>
        <button class="tool danger" data-tool="clear"><svg viewBox="0 0 24 24"><path d="M19 6l-2 14H7L5 6M10 11v6M14 11v6M3 6h18"/></svg></button>
      </div>
    </div>

    <div id="toast"></div>
  </div>

  <div id="menuSheet">
    <div class="sheet-backdrop"></div>
    <div class="sheet-content">
      <div class="sheet-item" id="leaveItem" style="color: #f87171;">צא מהקבוצה</div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
  /* --- לוגיקה --- */
  const state = {
    userName: '',
    userId: 'u_' + Math.random().toString(36).slice(2, 10),
    groupCode: '',
    tool: 'pan',
    members: {},
    drawings: [],
    map: null,
    markers: {},
    currentDrawing: null,
    syncBackend: null,
    lastPos: null
  };

  const userColors = ['#22d3ee', '#f59e0b', '#10b981', '#ef4444', '#a855f7', '#ec4899', '#06b6d4', '#84cc16'];
  function colorForUser(id) {
    let h = 0;
    for (let i = 0; i < id.length; i++) h = ((h << 5) - h) + id.charCodeAt(i);
    return userColors[Math.abs(h) % userColors.length];
  }

  // --- SYNC (Trystero) ---
  class HybridSync {
    constructor(groupCode) {
      this.groupCode = groupCode;
      this.handlers = { member: null, drawing: null, clear: null, delete: null };
      this._init();
    }
    async _init() {
      const { joinRoom } = await import('https://esm.sh/trystero@0.21.5/torrent');
      this.room = joinRoom({ appId: 'highcastle-v2' }, this.groupCode);
      
      const [sendPos, getPos] = this.room.makeAction('pos');
      const [sendDraw, getDraw] = this.room.makeAction('draw');
      const [sendClear, getClear] = this.room.makeAction('clear');
      const [sendDel, getDel] = this.room.makeAction('del');

      this.publishMember = (m) => sendPos(m);
      this.publishDrawing = (d) => sendDraw(d);
      this.clearDrawings = () => sendClear({});
      this.deleteDrawing = (id) => sendDel({id});

      getPos((m) => this.handlers.member && this.handlers.member(m.userId, m));
      getDraw((d) => this.handlers.drawing && this.handlers.drawing(d));
      getClear(() => this.handlers.clear && this.handlers.clear());
      getDel((data) => this.handlers.delete && this.handlers.delete(data.id));
    }
    on(ev, fn) { this.handlers[ev] = fn; }
  }

  // --- MAP & DRAW ---
  function initMap() {
    state.map = L.map('map', { zoomControl: false }).setView([32.0853, 34.7818], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(state.map);
    state.map.on('move zoom', redrawAllDrawings);
  }

  const canvas = document.getElementById('drawCanvas');
  const ctx = canvas.getContext('2d');

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    redrawAllDrawings();
  }
  window.addEventListener('resize', resizeCanvas);

  function redrawAllDrawings() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    state.drawings.forEach(drawShape);
    if (state.currentDrawing) drawShape(state.currentDrawing);
  }

  function drawShape(d) {
    if (!d.points || d.points.length < 1) return;
    ctx.strokeStyle = d.color;
    ctx.fillStyle = d.color;
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';

    const pts = d.points.map(p => {
      const point = state.map.latLngToContainerPoint([p[0], p[1]]);
      return [point.x, point.y];
    });

    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    if (d.type === 'draw') {
      pts.forEach(p => ctx.lineTo(p[0], p[1]));
    } else if (d.type === 'line' && pts.length > 1) {
      ctx.lineTo(pts[pts.length-1][0], pts[pts.length-1][1]);
    } else if (d.type === 'x') {
      const [x,y] = pts[0]; const s = 15;
      ctx.moveTo(x-s, y-s); ctx.lineTo(x+s, y+s);
      ctx.moveTo(x+s, y-s); ctx.lineTo(x-s, y+s);
    }
    ctx.stroke();
  }

  // --- INPUTS ---
  canvas.addEventListener('pointerdown', (e) => {
    if (state.tool === 'pan') return;
    const ll = state.map.containerPointToLatLng([e.clientX, e.clientY]);
    state.currentDrawing = {
      id: Date.now() + Math.random(),
      userId: state.userId,
      color: colorForUser(state.userId), // צבע נעול למשתמש
      type: state.tool,
      points: [[ll.lat, ll.lng]]
    };
  });

  canvas.addEventListener('pointermove', (e) => {
    if (!state.currentDrawing) return;
    const ll = state.map.containerPointToLatLng([e.clientX, e.clientY]);
    if (state.tool === 'draw') state.currentDrawing.points.push([ll.lat, ll.lng]);
    else state.currentDrawing.points[1] = [ll.lat, ll.lng];
    redrawAllDrawings();
  });

  canvas.addEventListener('pointerup', () => {
    if (!state.currentDrawing) return;
    state.drawings.push(state.currentDrawing);
    state.syncBackend && state.syncBackend.publishDrawing(state.currentDrawing);
    state.currentDrawing = null;
    redrawAllDrawings();
  });

  // --- UI ---
  document.querySelectorAll('.tool').forEach(btn => {
    btn.addEventListener('click', () => {
      const t = btn.dataset.tool;
      if (t === 'clear') {
        state.drawings = []; state.syncBackend.clearDrawings(); redrawAllDrawings();
      } else if (t === 'undo') {
        const last = state.drawings.filter(d => d.userId === state.userId).pop();
        if (last) {
          state.drawings = state.drawings.filter(d => d.id !== last.id);
          state.syncBackend.deleteDrawing(last.id);
          redrawAllDrawings();
        }
      } else {
        state.tool = t;
        document.querySelectorAll('.tool').forEach(b => b.classList.toggle('active', b === btn));
        canvas.classList.toggle('active', t !== 'pan');
      }
    });
  });

  document.getElementById('joinBtn').addEventListener('click', () => {
    state.userName = document.getElementById('nameInput').value || 'אנונימי';
    state.groupCode = document.getElementById('joinCodeInput').value || 'ROOM-1';
    startApp();
  });

  document.getElementById('createBtn').addEventListener('click', () => {
    state.userName = document.getElementById('nameInput').value || 'אנונימי';
    state.groupCode = Math.random().toString(36).slice(2, 7).toUpperCase();
    startApp();
  });

  function startApp() {
    document.getElementById('setupScreen').classList.remove('active');
    document.getElementById('app').classList.add('active');
    document.getElementById('groupCodeDisplay').textContent = state.groupCode;
    initMap();
    resizeCanvas();
    state.syncBackend = new HybridSync(state.groupCode);
    
    state.syncBackend.on('drawing', d => { state.drawings.push(d); redrawAllDrawings(); });
    state.syncBackend.on('clear', () => { state.drawings = []; redrawAllDrawings(); });
    state.syncBackend.on('delete', id => { state.drawings = state.drawings.filter(x => x.id !== id); redrawAllDrawings(); });
    
    navigator.geolocation.watchPosition(p => {
      const m = { userId: state.userId, name: state.userName, lat: p.coords.latitude, lng: p.coords.longitude, color: colorForUser(state.userId) };
      state.syncBackend.publishMember(m);
      updateMarker(m);
    }, null, { enableHighAccuracy: true });
  }

  function updateMarker(m) {
    const icon = L.divIcon({
      html: `<div class="user-marker" style="background:${m.color}"></div><div class="marker-label">${m.name}</div>`,
      className: ''
    });
    if (state.markers[m.userId]) state.markers[m.userId].setLatLng([m.lat, m.lng]);
    else state.markers[m.userId] = L.marker([m.lat, m.lng], {icon}).addTo(state.map);
  }

  window.onload = () => document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('setupScreen').classList.add('active');

  </script>
</body>
</html>
